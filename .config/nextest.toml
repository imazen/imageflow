[profile.default]
# Visual regression tests download images and compare checksums; allow generous timeout
slow-timeout = { period = "120s", terminate-after = 2 }

# Tests are I/O-bound (downloading images, encoding/decoding); run with plenty of parallelism
test-threads = "num-cpus"

# Show which tests are slow
status-level = "slow"
final-status-level = "fail"

[profile.ci]
# CI gets stricter timeouts
slow-timeout = { period = "180s", terminate-after = 2 }
fail-fast = false
