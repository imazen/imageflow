[package]
name = "imageflow_core"
version = "4.0.0-alpha.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Image processing pipeline built on the zen crate ecosystem"

[lib]
doctest = false
bench = false

[dependencies]
# Schema types
imageflow_types = { path = "../imageflow_types" }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Zen ecosystem — core pipeline
zenpixels = { workspace = true }
zenpixels-convert = { workspace = true }
zencodecs = { workspace = true }
zenlayout = { workspace = true }
zenresize = { workspace = true }
zenfilters = { workspace = true }
zenjpeg = { workspace = true }
zencodec-types = { workspace = true }
garb = { workspace = true }

# UltraHDR
ultrahdr-core = { workspace = true }

# Color management
moxcms = { workspace = true }

# Cooperative cancellation
enough = { workspace = true }

# Pixel buffer types
rgb = { workspace = true }
imgref = { workspace = true }
bytemuck = { workspace = true }

# Color space conversion
linear-srgb = { workspace = true }

# Utilities
base64 = "0.22"

[dev-dependencies]
